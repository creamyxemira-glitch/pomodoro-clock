<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>心跳</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #06060c;
  touch-action: none;
  -webkit-tap-highlight-color: transparent;
}
canvas { display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
(function() {
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');

  let W, H, dpr, heartX, heartY, heartBase;

  function resize() {
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.scale(dpr, dpr);
    heartX = W / 2;
    heartY = H / 2;
    heartBase = Math.min(W, H) * 0.26;
  }
  window.addEventListener('resize', resize);
  resize();

  function heartPath(s) {
    return (ctx) => {
      ctx.beginPath();
      const n = 200;
      for (let i = 0; i <= n; i++) {
        const t = (i / n) * Math.PI * 2;
        const x = 16 * Math.pow(Math.sin(t), 3) * s;
        const y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t)) * s;
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.closePath();
    };
  }

  function heartSurfacePoint(angle, scale) {
    const t = angle;
    const s = heartBase * scale;
    const x = 16 * Math.pow(Math.sin(t), 3) * s;
    const y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t)) * s;
    return { x: heartX + x, y: heartY + y };
  }

  // ---- Physics ----
  const phys = {
    pos: 0, vel: 0,
    stiffness: 170,
    damping: 8,
    beatTimer: 0,
    nextBeat: 0.8,
    baseInterval: 0.8,
    intensity: 0,
    prevVel: 0,

    update(dt) {
      this.beatTimer += dt;
      if (this.beatTimer >= this.nextBeat) {
        this.beatTimer -= this.nextBeat;
        this.vel += 55 + Math.random() * 15;
        this.nextBeat = this.baseInterval * (0.87 + Math.random() * 0.26);
      }
      const accel = -this.stiffness * this.pos - this.damping * this.vel;
      this.vel += accel * dt;
      this.pos += this.vel * dt;
      const rawIntensity = Math.abs(this.vel) * 0.015;
      this.intensity += (rawIntensity - this.intensity) * Math.min(12 * dt, 1);
      this.intensity = Math.max(0, Math.min(1, this.intensity));
    },

    getScale() {
      return 1.0 - this.pos * 0.022;
    }
  };

  // ---- Particles ----
  const particles = [];
  const MAX_P = 200;

  class Particle {
    constructor(x, y, type) {
      this.x = x;
      this.y = y;
      this.type = type;
      this.init();
    }
    init() {
      const a = Math.random() * Math.PI * 2;
      const spd = this.type === 'burst' ? (3 + Math.random() * 12) : (0.5 + Math.random() * 2);
      this.vx = Math.cos(a) * spd;
      this.vy = Math.sin(a) * spd;
      this.life = 1;
      this.decay = this.type === 'burst' ? (0.25 + Math.random() * 1.0) : (0.08 + Math.random() * 0.25);
      this.size = this.type === 'burst' ? (1 + Math.random() * 5) : (0.8 + Math.random() * 2.5);
      this.hue = 340 + Math.random() * 30;
      this.sat = 80 + Math.random() * 20;
    }
    update(dt, intensity) {
      this.life -= this.decay * dt;
      const drag = this.type === 'burst' ? 0.97 : 0.995;
      this.vx *= drag;
      this.vy *= drag;
      this.vx += (Math.random() - 0.5) * intensity * 4;
      this.vy += (Math.random() - 0.5) * intensity * 4;
      this.x += this.vx * dt * 60;
      this.y += this.vy * dt * 60;
      return this.life > 0;
    }
    draw(ctx) {
      const alpha = this.life * 0.75;
      const sz = this.size * (0.4 + this.life * 0.6);
      ctx.beginPath();
      ctx.arc(this.x, this.y, sz, 0, Math.PI * 2);
      ctx.fillStyle = `hsla(${this.hue}, ${this.sat}%, ${48 + this.life * 28}%, ${alpha})`;
      ctx.fill();
      if (sz > 1.2 && this.type === 'burst') {
        ctx.beginPath();
        ctx.arc(this.x, this.y, sz * 2.2, 0, Math.PI * 2);
        ctx.fillStyle = `hsla(${this.hue}, 80%, 60%, ${alpha * 0.12})`;
        ctx.fill();
      }
    }
  }

  function spawnBurst(x, y, count, intensity) {
    for (let i = 0; i < count; i++) {
      if (particles.length >= MAX_P) {
        particles.sort((a, b) => a.life - b.life);
        particles.shift();
      }
      const p = new Particle(x, y, 'burst');
      const ba = Math.random() * Math.PI * 2;
      const bspd = intensity * (4 + Math.random() * 16);
      p.vx = Math.cos(ba) * bspd;
      p.vy = Math.sin(ba) * bspd;
      p.life = 0.6 + Math.random() * 0.4;
      particles.push(p);
    }
  }

  // ---- Shockwave rings ----
  const rings = [];
  class Ring {
    constructor(intensity) {
      this.radius = heartBase * 0.7;
      this.maxRadius = heartBase * 2.0 * (1 + intensity);
      this.alpha = 0.5 + intensity * 0.4;
      this.speed = 300 + intensity * 400;
    }
    update(dt) {
      this.radius += this.speed * dt;
      this.alpha -= dt * 1.6;
      return this.alpha > 0 && this.radius < this.maxRadius;
    }
    draw(ctx) {
      ctx.beginPath();
      ctx.arc(heartX, heartY, this.radius, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(255, 60, 80, ${this.alpha * 0.25})`;
      ctx.lineWidth = 1.5 * this.alpha;
      ctx.stroke();
      if (this.alpha > 0.2) {
        ctx.beginPath();
        ctx.arc(heartX, heartY, this.radius * 0.9, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(255, 120, 140, ${this.alpha * 0.12})`;
        ctx.lineWidth = 4 * this.alpha;
        ctx.stroke();
      }
    }
  }

  // ---- Ambient bg particles ----
  const bgParticles = [];
  for (let i = 0; i < 25; i++) {
    bgParticles.push({
      x: Math.random() * W,
      y: Math.random() * H,
      size: 0.5 + Math.random() * 2,
      speedX: (Math.random() - 0.5) * 0.3,
      speedY: (Math.random() - 0.5) * 0.3 - 0.15,
      alpha: 0.15 + Math.random() * 0.25,
      hue: 345 + Math.random() * 20,
      pulse: Math.random() * Math.PI * 2,
    });
  }

  // ---- Surface particles ----
  const surfParticles = [];
  for (let i = 0; i < 70; i++) {
    surfParticles.push({
      angle: Math.random() * Math.PI * 2,
      radiusOffset: 0.82 + Math.random() * 0.36,
      speed: (Math.random() - 0.5) * 0.25,
      size: 0.4 + Math.random() * 2.2,
      hue: 348 + Math.random() * 22,
      alphaBase: 0.25 + Math.random() * 0.5,
    });
  }

  // ---- Render ----
  function drawAmbientGlow(intensity) {
    const r = heartBase * 1.6 * (1 + intensity * 0.25);
    const g = ctx.createRadialGradient(heartX, heartY, heartBase * 0.25, heartX, heartY, r);
    g.addColorStop(0, `rgba(255, 25, 55, ${0.05 + intensity * 0.12})`);
    g.addColorStop(0.4, `rgba(200, 10, 40, ${0.025 + intensity * 0.05})`);
    g.addColorStop(0.75, `rgba(120, 5, 20, ${0.008 + intensity * 0.015})`);
    g.addColorStop(1, 'rgba(0, 0, 0, 0)');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);
  }

  function drawHeartGlow(scale, intensity) {
    const s = heartBase * scale;
    for (let i = 5; i >= 0; i--) {
      const ls = s * (1 + i * 0.07);
      const alpha = (0.025 + intensity * 0.07) * (1 - i / 6);
      ctx.save();
      ctx.translate(heartX, heartY);
      heartPath(ls)(ctx);
      const g = ctx.createRadialGradient(0, -ls * 0.15, ls * 0.08, 0, ls * 0.25, ls * 0.85);
      g.addColorStop(0, `rgba(255, 40, 70, ${alpha * 2.5})`);
      g.addColorStop(0.45, `rgba(255, 15, 45, ${alpha})`);
      g.addColorStop(1, 'rgba(150, 0, 25, 0)');
      ctx.fillStyle = g;
      ctx.fill();
      ctx.restore();
    }
  }

  function drawHeart(scale, intensity) {
    const s = heartBase * scale;
    ctx.save();
    ctx.translate(heartX, heartY);

    // shadow
    ctx.save();
    ctx.translate(s * 0.04, s * 0.06);
    heartPath(s)(ctx);
    ctx.fillStyle = 'rgba(0, 0, 0, 0.35)';
    ctx.fill();
    ctx.restore();

    // main body
    heartPath(s)(ctx);
    const grad = ctx.createRadialGradient(-s * 0.08, -s * 0.22, s * 0.04, s * 0.05, s * 0.18, s * 1.15);
    grad.addColorStop(0, '#ff5070');
    grad.addColorStop(0.22, '#e82848');
    grad.addColorStop(0.5, '#b0142c');
    grad.addColorStop(0.78, '#6e0a1a');
    grad.addColorStop(1, '#35040c');
    ctx.fillStyle = grad;
    ctx.fill();

    // edge stroke
    heartPath(s)(ctx);
    ctx.strokeStyle = 'rgba(180, 20, 40, 0.35)';
    ctx.lineWidth = 1.2;
    ctx.stroke();

    // inner highlight
    ctx.save();
    ctx.translate(-s * 0.025, -s * 0.05);
    heartPath(s * 0.76)(ctx);
    const innerGrad = ctx.createRadialGradient(-s * 0.04, -s * 0.12, 0, 0, 0, s * 0.45);
    innerGrad.addColorStop(0, 'rgba(255, 190, 190, 0.28)');
    innerGrad.addColorStop(0.45, 'rgba(255, 100, 120, 0.1)');
    innerGrad.addColorStop(1, 'rgba(200, 30, 50, 0)');
    ctx.fillStyle = innerGrad;
    ctx.fill();
    ctx.restore();

    // specular
    ctx.beginPath();
    ctx.ellipse(-s * 0.13, -s * 0.42, s * 0.1, s * 0.06, -0.35, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255, 255, 255, 0.07)';
    ctx.fill();

    ctx.beginPath();
    ctx.ellipse(-s * 0.07, -s * 0.52, s * 0.05, s * 0.03, -0.2, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255, 255, 255, 0.12)';
    ctx.fill();

    ctx.restore();
  }

  // ---- Main loop ----
  let lastTime = performance.now();
  let spawnTimer = 0;
  let ringTimer = 0;
  let lastIntensity = 0;

  function animate(time) {
    requestAnimationFrame(animate);

    let dt = (time - lastTime) / 1000;
    if (dt > 0.12) dt = 0.12;
    lastTime = time;

    phys.update(dt);
    const scale = phys.getScale();
    const intensity = phys.intensity;

    // clear
    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = '#06060c';
    ctx.fillRect(0, 0, W, H);

    // bg particles
    bgParticles.forEach(bp => {
      bp.x += bp.speedX;
      bp.y += bp.speedY;
      if (bp.x < -20) bp.x = W + 20;
      if (bp.x > W + 20) bp.x = -20;
      if (bp.y < -20) bp.y = H + 20;
      if (bp.y > H + 20) bp.y = -20;
      bp.pulse += dt * (0.8 + intensity * 2);
      const alpha = bp.alpha * (0.7 + 0.3 * Math.sin(bp.pulse));
      ctx.beginPath();
      ctx.arc(bp.x, bp.y, bp.size * (1 + intensity * 0.5), 0, Math.PI * 2);
      ctx.fillStyle = `hsla(${bp.hue}, 70%, 50%, ${alpha})`;
      ctx.fill();
    });

    drawAmbientGlow(intensity);
    drawHeartGlow(scale, intensity);

    // shockwave on beat peak
    ringTimer += dt;
    if (intensity > 0.55 && lastIntensity <= 0.55 && ringTimer > 0.15) {
      ringTimer = 0;
      rings.push(new Ring(intensity));
    }
    lastIntensity = intensity;

    for (let i = rings.length - 1; i >= 0; i--) {
      if (!rings[i].update(dt)) rings.splice(i, 1);
      else rings[i].draw(ctx);
    }

    // update & spawn particles
    for (let i = particles.length - 1; i >= 0; i--) {
      if (!particles[i].update(dt, intensity)) {
        particles[i] = particles[particles.length - 1];
        particles.pop();
      }
    }

    spawnTimer += dt;
    if (intensity > 0.25 && spawnTimer > 0.014) {
      spawnTimer = 0;
      const count = Math.floor(intensity * 8);
      if (count > 0) {
        const a = Math.random() * Math.PI * 2;
        const pt = heartSurfacePoint(a, scale);
        spawnBurst(pt.x, pt.y, count, intensity);
      }
    }

    // draw particles behind heart
    particles.forEach(p => { if (p.life < 0.5) p.draw(ctx); });

    // draw heart
    drawHeart(scale, intensity);

    // draw particles in front
    particles.forEach(p => { if (p.life >= 0.5) p.draw(ctx); });

    // surface particles
    surfParticles.forEach(sp => {
      sp.angle += sp.speed * dt * (1 + intensity * 3.5);
      const rOffset = sp.radiusOffset + intensity * 0.06 * Math.sin(sp.angle * 7 + time * 0.01);
      const pt = heartSurfacePoint(sp.angle, scale);
      const dx = pt.x - heartX;
      const dy = pt.y - heartY;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist > 0.001) {
        const ndx = dx / dist;
        const ndy = dy / dist;
        const sx = heartX + ndx * dist * (rOffset + (1 - rOffset) * 0.3);
        const sy = heartY + ndy * dist * (rOffset + (1 - rOffset) * 0.3);
        const alpha = sp.alphaBase + intensity * 0.4;
        ctx.beginPath();
        ctx.arc(sx, sy, sp.size * (1 + intensity * 0.6), 0, Math.PI * 2);
        ctx.fillStyle = `hsla(${sp.hue}, 85%, ${50 + intensity * 30}%, ${alpha})`;
        ctx.fill();
      }
    });

    // peak spark overlay
    if (intensity > 0.65) {
      const sparkAlpha = (intensity - 0.65) / 0.35 * 0.2;
      ctx.save();
      ctx.translate(heartX, heartY);
      heartPath(heartBase * scale * 1.03)(ctx);
      const sg = ctx.createRadialGradient(0, -heartBase * 0.15, 0, 0, 0, heartBase * 0.4);
      sg.addColorStop(0, `rgba(255, 200, 200, ${sparkAlpha})`);
      sg.addColorStop(1, 'rgba(255, 50, 80, 0)');
      ctx.fillStyle = sg;
      ctx.fill();
      ctx.restore();
    }
  }

  // seed initial particles
  for (let i = 0; i < 35; i++) {
    const a = Math.random() * Math.PI * 2;
    const pt = heartSurfacePoint(a, 1);
    const p = new Particle(pt.x, pt.y, 'ambient');
    p.life = Math.random();
    particles.push(p);
  }

  requestAnimationFrame(animate);

  document.addEventListener('visibilitychange', () => {
    if (!document.hidden) lastTime = performance.now();
  });
})();
</script>
</body>
</html>
